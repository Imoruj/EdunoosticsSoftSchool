<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Teal to Deep Blue -->
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00A99A" />
      <stop offset="100%" stop-color="#1B4270" />
    </linearGradient>
    <!-- Purple to Teal -->
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5B2DAA" />
      <stop offset="100%" stop-color="#00A99A" />
    </linearGradient>
    <!-- Gold to Purple -->
    <linearGradient id="grad3" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#C69214" />
      <stop offset="100%" stop-color="#5B2DAA" />
    </linearGradient>
    <filter id="shadowStem" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="8" dy="0" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="shadowTop" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="shadowBottom" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="-8" stdDeviation="16" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect width="512" height="512" fill="transparent" />

  <g transform="translate(35, 0)">
    <!-- Stem -->
    <rect x="100" y="70" width="80" height="372" rx="40" fill="url(#grad1)" filter="url(#shadowStem)" />
    
    <!-- Bottom Loop -->
    <path d="M140 250 H270 A76 76 0 0 1 270 402 H140" fill="none" stroke="url(#grad3)" stroke-width="80" stroke-linecap="round" filter="url(#shadowBottom)" />

    <!-- Top Loop -->
    <path d="M140 110 H240 A70 70 0 0 1 240 250 H140" fill="none" stroke="url(#grad2)" stroke-width="80" stroke-linecap="round" filter="url(#shadowTop)" />
  </g>
</svg>
